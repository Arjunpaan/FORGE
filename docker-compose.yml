

services:
  postgres:
    image: postgres:16
    container_name: forge_postgres
    restart: always
    environment:
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_password
      POSTGRES_DB: forge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: forge_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:




