<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FORGE — Live Store Dashboard</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background: #0b0d12;
        color: #e4e6ec;
        padding: 32px 40px;
        min-height: 100vh;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #1c1f28;
    }

    .header h1 {
        font-size: 26px;
        font-weight: 700;
        color: #f5f5f7;
        letter-spacing: -0.5px;
    }

    .subtitle {
        color: #6b7080;
        font-size: 13px;
        margin-top: 4px;
    }

    .live-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        margin-right: 6px;
        box-shadow: 0 0 6px #22c55e;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.35; }
        100% { opacity: 1; }
    }

    .controls { display: flex; gap: 10px; }

    .btn {
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid #262a35;
        background: #16181f;
        color: #d0d2db;
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .btn:hover { background: #1c1f28; border-color: #3b4256; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }

    .btn-danger { background: #dc2626; border-color: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    .btn-warn { background: #d97706; border-color: #d97706; color: #fff; }
    .btn-warn:hover { background: #b45309; }

    /* Chaos banner */
    .chaos-banner {
        display: none;
        background: linear-gradient(90deg, rgba(220,38,38,0.15), rgba(220,38,38,0.05));
        border: 1px solid rgba(220,38,38,0.4);
        border-radius: 10px;
        padding: 12px 18px;
        margin-bottom: 20px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 600;
        color: #fca5a5;
    }
    .chaos-banner.active { display: flex; }
    .chaos-banner .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ef4444;
        animation: pulse 0.8s infinite;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 14px;
        margin-bottom: 24px;
    }

    .stat-card {
        background: #12141b;
        border-radius: 12px;
        padding: 18px 20px;
        border: 1px solid #1c1f28;
    }

    .stat-label {
        color: #6b7080;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .stat-value {
        font-size: 26px;
        font-weight: 700;
        color: #f5f5f7;
    }

    .stat-completed .stat-value { color: #4ade80; }
    .stat-pending .stat-value { color: #fbbf24; }
    .stat-total .stat-value { color: #60a5fa; }
    .stat-failed .stat-value { color: #f87171; }

    .panels {
        display: grid;
        grid-template-columns: 1.4fr 1fr 0.9fr;
        gap: 16px;
        align-items: start;
    }

    .panel {
        background: #12141b;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #1c1f28;
    }

    .panel h2 {
        font-size: 14px;
        margin-bottom: 16px;
        color: #d0d2db;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .panel h2 .count { font-size: 11.5px; color: #6b7080; font-weight: 500; }

    .category-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 600;
        background: #1c1f28;
        color: #9497a5;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s ease;
    }
    .chip:hover { background: #23262f; color: #d0d2db; }
    .chip.active { background: #2a2f3d; color: #93c5fd; border-color: #3b4256; }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        max-height: 560px;
        overflow-y: auto;
        padding-right: 6px;
    }
    .product-grid::-webkit-scrollbar { width: 6px; }
    .product-grid::-webkit-scrollbar-thumb { background: #262a35; border-radius: 10px; }

    .product-card {
        background: #16181f;
        border: 1px solid #1c1f28;
        border-radius: 10px;
        overflow: hidden;
        transition: all 0.2s ease;
        cursor: pointer;
    }
    .product-card:hover {
        border-color: #3b4256;
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .product-image-wrap {
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #1c1f28;
        position: relative;
    }
    .product-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .stock-tag {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 9.5px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        backdrop-filter: blur(4px);
    }
    .tag-instock { background: rgba(34,197,94,0.2); color: #4ade80; }
    .tag-low { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .tag-out { background: rgba(239,68,68,0.2); color: #f87171; }

    .product-info { padding: 10px 12px 12px; }
    .product-category { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7080; font-weight: 600; margin-bottom: 4px; }
    .product-name {
        font-size: 12px; font-weight: 600; color: #e4e6ec; margin-bottom: 6px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-bottom-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .product-price { font-size: 13.5px; font-weight: 700; color: #f5f5f7; }
    .product-stock-count { font-size: 10px; color: #6b7080; }

    .order-btn {
        width: 100%;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #262a35;
        background: #1c1f28;
        color: #93c5fd;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .order-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }
    .order-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Orders table */
    .orders-scroll { max-height: 560px; overflow-y: auto; }
    .orders-scroll::-webkit-scrollbar { width: 6px; }
    .orders-scroll::-webkit-scrollbar-thumb { background: #262a35; border-radius: 10px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
        text-align: left; color: #6b7080; padding: 8px 6px;
        border-bottom: 1px solid #1c1f28; font-weight: 600;
        text-transform: uppercase; font-size: 9.5px; letter-spacing: 0.5px;
        position: sticky; top: 0; background: #12141b;
    }
    td { padding: 9px 6px; border-bottom: 1px solid #171a22; color: #c8cad3; }
    tr:hover td { background: #16181f; }

    .status-badge {
        padding: 3px 9px; border-radius: 20px; font-size: 9.5px;
        font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .status-completed { background: rgba(34,197,94,0.15); color: #4ade80; }
    .status-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status-failed { background: rgba(239,68,68,0.15); color: #f87171; }

    /* Activity log */
    .log-container {
        max-height: 560px;
        overflow-y: auto;
        display: flex;
        flex-direction: column-reverse;
    }
    .log-container::-webkit-scrollbar { width: 6px; }
    .log-container::-webkit-scrollbar-thumb { background: #262a35; border-radius: 10px; }

    .log-entry {
        font-size: 11.5px;
        padding: 8px 10px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-family: 'Consolas', monospace;
        line-height: 1.4;
        border-left: 3px solid #262a35;
        background: #16181f;
    }
    .log-success { border-left-color: #22c55e; color: #86efac; }
    .log-error { border-left-color: #ef4444; color: #fca5a5; }
    .log-info { border-left-color: #60a5fa; color: #93c5fd; }
    .log-time { color: #4b4f5c; margin-right: 6px; }

    .empty-state { color: #4b4f5c; font-size: 12px; text-align: center; padding: 30px 0; }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>FORGE</h1>
        <div class="subtitle"><span class="live-dot"></span>Distributed Order Processing System — Live Store Dashboard</div>
    </div>
    <div class="controls">
        <button class="btn btn-warn" onclick="simulateStampede()">⚡ Simulate Stampede</button>
        <button class="btn btn-danger" id="chaos-btn" onclick="triggerChaos()">🔥 Trigger Chaos (10s)</button>
    </div>
</div>

<div class="chaos-banner" id="chaos-banner">
    <span class="dot"></span>
    <span id="chaos-banner-text">SIMULATED OUTAGE ACTIVE — orders will fail until recovery</span>
</div>

<div class="stats-grid">
    <div class="stat-card stat-total">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="total-orders">-</div>
    </div>
    <div class="stat-card stat-completed">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="completed-orders">-</div>
    </div>
    <div class="stat-card stat-pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="pending-orders">-</div>
    </div>
    <div class="stat-card stat-failed">
        <div class="stat-label">Failed (session)</div>
        <div class="stat-value" id="failed-orders">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Products Live</div>
        <div class="stat-value" id="total-products">-</div>
    </div>
</div>

<div class="panels">
    <div class="panel">
        <h2>Store Catalog <span class="count" id="product-count-label"></span></h2>
        <div class="category-chips" id="category-chips"></div>
        <div class="product-grid" id="products-container"></div>
    </div>

    <div class="panel">
        <h2>Recent Orders <span class="count">live</span></h2>
        <div class="orders-scroll">
            <table>
                <thead><tr><th>ID</th><th>Product</th><th>Status</th><th>Time</th></tr></thead>
                <tbody id="orders-body"></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <h2>Activity Log <span class="count">real-time</span></h2>
        <div class="log-container" id="log-container"></div>
    </div>
</div>

<script>
let allProducts = [];
let activeCategory = 'All';
let failedCount = 0;

function nowTime() {
    return new Date().toLocaleTimeString();
}

function addLog(message, type = 'info') {
    const container = document.getElementById('log-container');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    entry.innerHTML = `<span class="log-time">${nowTime()}</span>${message}`;
    container.appendChild(entry);
    while (container.children.length > 50) container.removeChild(container.firstChild);
}

function stockTag(stock) {
    if (stock === 0) return { cls: 'tag-out', label: 'Out of stock' };
    if (stock <= 20) return { cls: 'tag-low', label: 'Low stock' };
    return { cls: 'tag-instock', label: 'In stock' };
}

async function placeOrder(productName, btnEl) {
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Placing...'; }
    const key = `dashboard-${productName.replace(/\s+/g, '-')}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
    try {
        const res = await fetch('/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idempotency_key: key, product_name: productName, quantity: 1 })
        });
        const data = await res.json();
        if (res.ok) {
            addLog(`Order #${data.order_id} placed — ${productName}`, 'success');
        } else {
            failedCount++;
            document.getElementById('failed-orders').textContent = failedCount;
            addLog(`Order FAILED — ${productName}: ${data.detail}`, 'error');
        }
    } catch (err) {
        failedCount++;
        document.getElementById('failed-orders').textContent = failedCount;
        addLog(`Order FAILED — ${productName}: network error`, 'error');
    }
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Place Order'; }
    refreshDashboard();
}

async function simulateStampede() {
    addLog('Firing 15 concurrent requests at the same product...', 'info');
    const target = allProducts[0]?.name || 'Wireless Mouse';
    const requests = [];
    for (let i = 0; i < 15; i++) {
        const key = `stampede-${Date.now()}-${i}`;
        requests.push(
            fetch('/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idempotency_key: key, product_name: target, quantity: 1 })
            }).then(async r => {
                const data = await r.json();
                if (r.ok) {
                    addLog(`Stampede: Order #${data.order_id} succeeded`, 'success');
                } else {
                    failedCount++;
                    document.getElementById('failed-orders').textContent = failedCount;
                    addLog(`Stampede: request failed — ${data.detail || 'error'}`, 'error');
                }
            }).catch(() => {
                failedCount++;
                document.getElementById('failed-orders').textContent = failedCount;
                addLog('Stampede: request failed — network error', 'error');
            })
        );
    }
    await Promise.all(requests);
    addLog('Stampede simulation complete.', 'info');
    refreshDashboard();
}

async function triggerChaos() {
    const btn = document.getElementById('chaos-btn');
    btn.disabled = true;
    const res = await fetch('/chaos/trigger', { method: 'POST' });
    const data = await res.json();
    addLog(`⚠️ Chaos triggered — simulated outage for ${data.duration || 10}s`, 'error');

    const banner = document.getElementById('chaos-banner');
    banner.classList.add('active');
    let remaining = data.duration || 10;
    const bannerText = document.getElementById('chaos-banner-text');
    bannerText.textContent = `SIMULATED OUTAGE ACTIVE — ${remaining}s remaining — orders will fail`;

    const countdown = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(countdown);
            banner.classList.remove('active');
            btn.disabled = false;
            addLog('✅ System recovered — orders processing normally again', 'success');
        } else {
            bannerText.textContent = `SIMULATED OUTAGE ACTIVE — ${remaining}s remaining — orders will fail`;
        }
    }, 1000);
}

function renderProducts() {
    const filtered = activeCategory === 'All' ? allProducts : allProducts.filter(p => p.category === activeCategory);
    document.getElementById('product-count-label').textContent = `${filtered.length} items`;

    if (filtered.length === 0) {
        document.getElementById('products-container').innerHTML = '<div class="empty-state">No products in this category</div>';
        return;
    }

    document.getElementById('products-container').innerHTML = filtered.map(p => {
        const tag = stockTag(p.stock);
        const safeName = p.name.replace(/'/g, "\\'");
        return `
            <div class="product-card">
                <div class="product-image-wrap">
                    <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x400/1c1f28/6b7080?text=No+Image'">
                    <div class="stock-tag ${tag.cls}">${tag.label}</div>
                </div>
                <div class="product-info">
                    <div class="product-category">${p.category}</div>
                    <div class="product-name" title="${p.name}">${p.name}</div>
                    <div class="product-bottom-row">
                        <div class="product-price">₹${p.price.toFixed(0)}</div>
                        <div class="product-stock-count">${p.stock} left</div>
                    </div>
                    <button class="order-btn" onclick="placeOrder('${safeName}', this)" ${p.stock === 0 ? 'disabled' : ''}>
                        ${p.stock === 0 ? 'Out of Stock' : 'Place Order'}
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

function renderCategoryChips() {
    const categories = ['All', ...new Set(allProducts.map(p => p.category))];
    document.getElementById('category-chips').innerHTML = categories.map(cat => `
        <div class="chip ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</div>
    `).join('');
}

function setCategory(cat) {
    activeCategory = cat;
    renderCategoryChips();
    renderProducts();
}

async function refreshDashboard() {
    try {
        const stats = await fetch('/stats').then(r => r.json());
        document.getElementById('total-orders').textContent = stats.total_orders;
        document.getElementById('completed-orders').textContent = stats.completed;
        document.getElementById('pending-orders').textContent = stats.pending;

        const products = await fetch('/products').then(r => r.json());
        allProducts = products;
        document.getElementById('total-products').textContent = products.length;

        if (document.getElementById('category-chips').innerHTML === '') renderCategoryChips();
        renderProducts();

        const orders = await fetch('/orders').then(r => r.json());
        document.getElementById('orders-body').innerHTML = orders.map(o => `
            <tr>
                <td>#${o.id}</td>
                <td>${o.product_name}</td>
                <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                <td>${new Date(o.created_at).toLocaleTimeString()}</td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Dashboard refresh failed:', err);
    }
}

addLog('Dashboard initialized.', 'info');
refreshDashboard();
setInterval(refreshDashboard, 3000);
</script>

</body>
</html>
